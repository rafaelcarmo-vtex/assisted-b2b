<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Demostore - Storefront Prototype</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <style>
      :root {
        --order-row-height: 48px;
      }

      .order-row-height {
        height: var(--order-row-height);
        min-height: var(--order-row-height);
        flex-shrink: 0;
      }

      body {
        font-family: 'Inter', sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        display: inline-block;
        line-height: 1;
        text-transform: none;
        letter-spacing: normal;
        word-wrap: normal;
        white-space: nowrap;
        direction: ltr;
      }
      .material-symbols-filled {
        font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }

      ::-webkit-scrollbar {
        width: 12px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background-color: #adadad;
        border-radius: 10px;
        border: 4px solid transparent;
        background-clip: content-box;
      }
      ::-webkit-scrollbar-thumb:hover {
        background-color: #8e8e8e;
      }

      .loading-bar-container {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 4px;
        overflow: hidden;
        background-color: #e0e0e0;
        z-index: 100;
        pointer-events: none;
      }

      .loading-bar-inner {
        position: relative;
        width: 100%;
        height: 100%;
      }

      .loading-bar-piece {
        position: absolute;
        background-color: #000;
        top: 0;
        bottom: 0;
        left: 0;
        width: 100%;
        transform-origin: left;
        will-change: transform;
      }

      .loading-bar-piece.primary {
        animation: m3-primary 2.1s cubic-bezier(0.65, 0.815, 0.735, 0.395) infinite;
      }

      .loading-bar-piece.secondary {
        animation: m3-secondary 2.1s cubic-bezier(0.165, 0.84, 0.44, 1) infinite;
        animation-delay: 1.15s;
      }

      @keyframes m3-primary {
        0% { transform: translateX(-35%) scaleX(0.35); }
        60% { transform: translateX(100%) scaleX(0.9); }
        100% { transform: translateX(100%) scaleX(0.9); }
      }

      @keyframes m3-secondary {
        0% { transform: translateX(-200%) scaleX(0.3); }
        60% { transform: translateX(107%) scaleX(0.3); }
        100% { transform: translateX(107%) scaleX(0.3); }
      }

      * {
        scrollbar-width: thin;
        scrollbar-color: #adadad transparent;
      }

      @keyframes page-fade-in {
        from {
          opacity: 0;
          transform: translateY(6px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .animate-page-in {
        animation: page-fade-in 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      }

      .thinking-gradient {
        background: linear-gradient(90deg, #707070 0%, #a7a7a7 50%, #707070 100%);
        background-size: 200% 100%;
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        animation: thinking-shimmer 1.8s ease-in-out infinite;
      }

      @keyframes thinking-shimmer {
        0% {
          background-position: 100% 0;
        }
        100% {
          background-position: -100% 0;
        }
      }

      .message-input-scroll {
        scrollbar-width: thin;
        scrollbar-color: #adadad transparent;
      }
      .message-input-scroll::-webkit-scrollbar {
        width: 6px;
      }
      .message-input-scroll::-webkit-scrollbar-track {
        background: transparent;
      }
      .message-input-scroll::-webkit-scrollbar-thumb {
        background-color: #adadad;
        border-radius: 9999px;
      }
      .message-input-scroll::-webkit-scrollbar-thumb:hover {
        background-color: #8e8e8e;
      }

      .panel-scroll {
        scrollbar-width: thin;
        scrollbar-color: #adadad transparent;
      }
      .panel-scroll::-webkit-scrollbar {
        width: 8px;
      }
      .panel-scroll::-webkit-scrollbar-track {
        background: transparent;
      }
      .panel-scroll::-webkit-scrollbar-thumb {
        background-color: #adadad;
        border: 2px solid transparent;
        background-clip: content-box;
        border-radius: 9999px;
      }
      .panel-scroll::-webkit-scrollbar-thumb:hover {
        background-color: #8e8e8e;
      }

      .quotes-scroll {
        scrollbar-width: thin;
        scrollbar-color: #adadad transparent;
      }
      .quotes-scroll::-webkit-scrollbar {
        width: 6px;
      }
      .quotes-scroll::-webkit-scrollbar-track {
        background: transparent;
      }
      .quotes-scroll::-webkit-scrollbar-thumb {
        background-color: #adadad;
        border-radius: 9999px;
      }
      .quotes-scroll::-webkit-scrollbar-thumb:hover {
        background-color: #8e8e8e;
      }

      .processing-progress-bar {
        width: 13px;
        animation-name: processing-progress-fill;
        animation-timing-function: linear;
        animation-fill-mode: forwards;
      }

      .chat-message-appear {
        animation: chat-message-appear 220ms cubic-bezier(0.2, 0, 0, 1) both;
      }

      .attach-menu-appear {
        animation: attach-menu-appear 140ms cubic-bezier(0.2, 0, 0, 1) both;
      }

      .composer-tool-pill {
        background-color: transparent;
        transition: background-color 120ms ease;
        animation: attach-menu-appear 160ms cubic-bezier(0.2, 0, 0, 1) both;
      }

      .composer-tool-pill:hover {
        background-color: rgba(3, 102, 221, 0.10);
      }

      .composer-tool-pill__icon-hover {
        display: none;
      }

      .composer-tool-pill:hover .composer-tool-pill__icon-default {
        display: none;
      }

      .composer-tool-pill:hover .composer-tool-pill__icon-hover {
        display: inline-block;
      }

      @keyframes attach-menu-appear {
        from {
          opacity: 0;
          transform: translateY(4px) scale(0.98);
        }
        to {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }

      @keyframes calendar-month-enter {
        from {
          opacity: 0;
          transform: translateX(var(--enter-from, 0));
        }
        to {
          opacity: 1;
          transform: translateX(0);
        }
      }

      .calendar-month-enter {
        animation: calendar-month-enter 200ms cubic-bezier(0.2, 0, 0, 1) both;
      }

      .product-row-appear {
        animation: product-row-appear 240ms cubic-bezier(0.2, 0, 0, 1) both;
      }

      .product-row-disappear {
        animation: product-row-disappear 240ms cubic-bezier(0.32, 0, 0.32, 1) both;
        pointer-events: none;
      }

      .canvas-thinking-pulse {
        animation: canvas-thinking-pulse 2s ease-in-out infinite;
      }

      @keyframes canvas-thinking-pulse {
        0%, 100% {
          opacity: 1;
        }
        50% {
          opacity: 0.3;
        }
      }

      .canvas-write-breathe {
        animation: canvas-write-breathe 900ms cubic-bezier(0.4, 0, 0.4, 1);
      }

      @keyframes canvas-write-breathe {
        0% { opacity: 1; }
        35% { opacity: 0.35; }
        100% { opacity: 1; }
      }

      .canvas-page-enter {
        animation: canvas-page-enter 360ms cubic-bezier(0.2, 0, 0, 1) both;
      }

      @keyframes canvas-page-enter {
        from {
          opacity: 0;
          transform: translateY(8px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes chat-message-appear {
        from {
          opacity: 0;
          transform: translateY(6px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes product-row-appear {
        from {
          opacity: 0;
          transform: translateY(4px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes product-row-disappear {
        from {
          opacity: 1;
          transform: translateY(0);
        }
        to {
          opacity: 0;
          transform: translateY(-12px);
        }
      }

      @keyframes processing-progress-fill {
        from {
          width: 13px;
        }
        to {
          width: 342px;
        }
      }
    </style>
    <script type="module" crossorigin src="/assisted-b2b/handoffs/quotes-buyer-phase-1/assets/index-FDnSG0jW.js"></script>
  </head>
  <body class="bg-white text-gray-900 overflow-hidden">
    <div id="root"></div>
  </body>
</html>
